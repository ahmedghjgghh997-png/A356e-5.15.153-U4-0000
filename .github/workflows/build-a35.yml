name: Build A35 Kernel (Exynos) using local script

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط سورس الكيرنال (GitHub, Google Drive, أو رابط مباشر)'
        required: true
      boot_img_url:
        description: 'رابط boot.img الأصلي (اختياري)'
        required: false
      permissive:
        description: 'Permissive SELinux (gabriel / thomas / none)'
        required: false
        default: 'gabriel'
      zram_lz4:
        description: 'استخدام lz4 في zram (true/false)'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository (to get build_a35.sh)
        uses: actions/checkout@v4

      - name: Install dependencies (for script)
        run: |
          sudo apt update
          sudo apt install -y git-all make gcc python-is-python3 build-essential openssl pip bc bison flex cpio kmod wget curl unzip xz-utils device-tree-compiler libssl-dev libtinfo5
          pip install gdown

      - name: Make script executable
        run: chmod +x build_a35.sh

      - name: Run build script
        run: |
          ./build_a35.sh \
            --source-url "${{ github.event.inputs.source_url }}" \
            --boot-url "${{ github.event.inputs.boot_img_url }}" \
            --permissive "${{ github.event.inputs.permissive }}" \
            --zram-lz4 "${{ github.event.inputs.zram_lz4 == 'true' && '--zram-lz4' || '' }}" \
            --push-github ""   # لا نريد دفع GitHub من Actions هنا
        continue-on-error: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: a35-kernel-output
          path: build_output/
